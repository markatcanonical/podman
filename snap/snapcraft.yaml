name: podman
base: core26
build-base: devel
version: 'git'
summary: Daemonless container engine for OCI containers
description: |
  Podman is a daemonless, open source, Linux native tool designed to make it easy to find, run,
  build, share and deploy applications using Open Containers Initiative (OCI) Containers and
  Container Images.
  
  This snap exposes the rootless Podman API socket via the `podman-socket` content interface,
  allowing other snaps to easily interact with the Podman daemon.

adopt-info: podman
confinement: classic
grade: devel

apps:
  podman:
    command: usr/bin/podman
    environment:
      CONTAINERS_CONF: $SNAP/etc/containers.conf

  service:
    command: snap/start-podman-service.sh
    daemon: simple
    daemon-scope: user
    install-mode: disable
    restart-condition: on-failure
    environment:
      CONTAINERS_CONF: $SNAP/etc/containers.conf

slots:
  podman-socket:
    interface: content
    content: podman-socket
    read:
      - $SNAP_USER_COMMON/socket
    write:
      - $SNAP_USER_COMMON/socket

parts:
  podman:
    plugin: make
    source: .
    build-packages:
      - golang-go
      - pkg-config
      - libseccomp-dev
      - libapparmor-dev
      - libselinux1-dev
      - libglib2.0-dev
      - btrfs-progs
      - libbtrfs-dev
      - libsystemd-dev
      - libgpgme-dev
      - go-md2man
      - iptables
    build-environment:
      - CGO_ENABLED: '1'
    stage-packages:
      - libgpgme45
    override-build: |
      craftctl default
      make binaries
      make install.bin install.remote PREFIX=$SNAPCRAFT_PART_INSTALL/usr
    override-pull: |
      # Pull the source using snapcraft.
      craftctl default

      # Set defaults.
      grade=devel
      full_tag="$(git describe --tags --abbrev=0 2>/dev/null)" || true
      hash="$(git rev-parse --short HEAD 2>/dev/null)"

      # Remove leading 'v' from tag for the version string.
      tag="${full_tag#v}"

      # Check for tagged version.
      if [ -n "$full_tag" ]; then
        count="$(git rev-list "$full_tag".. --count 2>/dev/null)"
        if [ "$count" -eq 0 ]; then
          version="$tag"
          grade=stable
        else
          version="$tag+git$count.$hash"
        fi
      else
        count="$(git rev-list HEAD --count 2>/dev/null)"
        version="0+git$count.$hash"
      fi

      # Relay back to snapcraft.
      craftctl set grade="$grade"
      craftctl set version="$version"


  crun:
    plugin: autotools
    source: https://github.com/containers/crun.git
    source-tag: '1.27.1' # Pinned to the latest stable version
    build-packages:
      - python3
      - git
      - gcc
      - libc6-dev
      - libcap-dev
      - libseccomp-dev
      - libyajl-dev
      - go-md2man
      - libtool
      - autoconf
      - automake
      - pkg-config
      - libsystemd-dev
    stage-packages:
      - libyajl2
    autotools-configure-parameters:
      - --prefix=/usr

  conmon:
    plugin: make
    source: https://github.com/containers/conmon.git
    source-tag: 'v2.2.1'
    build-packages:
      - pkg-config
      - libglib2.0-dev
      - libseccomp-dev
    override-build: |
      make
      make install PREFIX=$SNAPCRAFT_PART_INSTALL/usr

  slirp4netns:
    plugin: autotools
    source: https://github.com/rootless-containers/slirp4netns.git
    source-tag: 'v1.3.3'
    build-packages:
      - make
      - gcc
      - libglib2.0-dev
      - libcap-dev
      - libseccomp-dev
      - libslirp-dev
      - autoconf
      - automake
    stage-packages:
      - libslirp0
    autotools-configure-parameters:
      - --prefix=/usr

  netavark:
    plugin: make
    source: https://github.com/containers/netavark.git
    source-tag: 'v1.17.2'
    build-packages:
      - rustc
      - cargo
      - protobuf-compiler
      - pkg-config
    override-build: |
      make
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/libexec/podman/
      cp bin/netavark $SNAPCRAFT_PART_INSTALL/usr/libexec/podman/

  aardvark-dns:
    plugin: make
    source: https://github.com/containers/aardvark-dns.git
    source-tag: 'v1.17.1'
    build-packages:
      - rustc
      - cargo
    override-build: |
      make
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/libexec/podman/
      cp bin/aardvark-dns $SNAPCRAFT_PART_INSTALL/usr/libexec/podman/

  wrapper:
    plugin: dump
    source: snap/
    organize:
      start-podman-service.sh: snap/start-podman-service.sh
